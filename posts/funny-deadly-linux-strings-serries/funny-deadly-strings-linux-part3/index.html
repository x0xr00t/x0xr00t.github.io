<style>

:root {
    --bg:#050505;
    --panel:#0b0b0b;

    --text:#d7ffd7;
    --green:#00ff66;
    --cyan:#00eaff;
    --red:#ff3344;
    --muted:#888;
}
   
   * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        background: radial-gradient(circle at top, #102010 0%, #050505 45%);
        color: var(--text);
        font-family: \"Courier New\", monospace;

    body::before {

        pointer-events: none;
    }

    .container {
        max-width: 1100px;
        margin: auto;

    }

    /* HERO */
    .hero {
        text-align: center;
        padding: 50px 20px;
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid var(--border);
        box-shadow: 0 0 30px rgba(0, 255, 102, 0.15);
    }

    .ascii {
        color: var(--green);
        text-shadow: 0 0 10px var(--green);
        overflow: auto;
        white-space: pre;
    }

    .title {
        color: white;
        font-size: clamp(28px, 5vw, 55px);
    }

    .subtitle {
        color: var(--cyan);
    }

    .meta {
        color: #aaa;
    }

    /* CONTENT */
    .section {
        margin-top: 40px;
        padding: 30px;
        background: rgba(10, 10, 10, 0.85);
        border: 1px solid var(--border);
        border-radius: 8px;
        animation: fade 1s ease;
    }

    .section h2 {
        color: var(--green);
        border-left: 4px solid var(--green);
        padding-left: 15px;
    }

    p {
        color: #ddd;
    }

    .quote {
        background: #080808;
        border-left: 3px solid var(--red);
        padding: 20px;
        color: white;
        font-style: italic;
    }

    .terminal {
        background: #000;
        border: 1px solid #333;
        padding: 20px;
        margin-top: 15px;
        border-radius: 8px;
        overflow: auto;
        box-shadow: inset 0 0 20px rgba(0, 255, 102, 0.08);
    }

    .prompt {
        color: var(--green);
    }

    .code {
        color: #00ffaa;
    }

    .output {
        color: #aaa;
    }

    .terminal-title {
        color: var(--green);
        font-weight: bold;
    }

    .badge {
        display: inline-block;
        padding: 6px 12px;
        border: 1px solid var(--green);
        color: var(--green);
        border-radius: 20px;
        margin: 5px;
    }

    footer {
        text-align: center;
        margin-top: 60px;
        padding: 30px;
        color: var(--muted);
    }

    .cursor {
        display: inline-block;
        width: 10px;
        height: 20px;
        background: var(--green);
        animation: blink 1s infinite;
    }

    @keyframes blink {
        50% {
            opacity: 0;
        }
    }

    @keyframes fade {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: none;
        }
    }
</style>
